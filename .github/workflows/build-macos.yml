name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos-arm:
    runs-on: macos-latest
    name: macOS Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Ad-hoc sign
        run: |
          APP=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" | head -1)
          codesign --force --deep --sign - "$APP"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
          body: |
            ## dskube ${{ github.ref_name }}

            ### 다운로드
            - **Apple Silicon (M1/M2/M3/M4)**: `*_aarch64.dmg`

            ### 설치
            1. `.dmg` 다운로드 후 앱을 Applications로 드래그
            2. 처음 실행 시 "인터넷에서 다운로드된 앱" 경고 → **열기** 클릭
