name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  build-macos-arm:
    runs-on: macos-latest
    name: macOS Apple Silicon
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > /tmp/package.json
          mv /tmp/package.json package.json
          echo "Building version $VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build (with ad-hoc signing)
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
          body: |
            ## dskube ${{ github.ref_name }}

            ### 다운로드
            - **Apple Silicon (M1/M2/M3/M4)**: `*_aarch64.dmg`

            ### 설치
            1. `.dmg` 다운로드 후 앱을 Applications로 드래그
            2. 처음 실행 시 "인터넷에서 다운로드된 앱" 경고 → **열기** 클릭
